services:
  access-gate:
    build: .
    container_name: access-gate-b3
    ports:
      - "8000:3003"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://access:access@db:5432/access_gate
      CORE_BUSINESS_URL: http://26.76.38.192:8000
      ANALYTICS_URL: http://26.21.187.230:8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3003/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./evidence/logs:/app/evidence/logs
    networks:
      - product-b-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: access-gate-db
    environment:
      POSTGRES_USER: access
      POSTGRES_PASSWORD: access
      POSTGRES_DB: access_gate
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U access -d access_gate"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - product-b-net

volumes:
  pgdata:

networks:
  product-b-net:
    name: product-b-net
    driver: bridge
